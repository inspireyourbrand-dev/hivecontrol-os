<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks - HiveControl OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Headings */
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
        }

        /* Colors & Accent */
        :root {
            --cyan: #3ebaf4;
            --purple: #df30ff;
            --yellow: #ffe930;
            --green: #00d49b;
            --red: #ff4757;
            --orange: #ff9500;
            --gray: #666666;
            --dark-bg: #0a0a0a;
            --card-bg: #1a1a1a;
            --card-hover: #252525;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 24px;
            background: var(--card-bg);
            border-bottom: 1px solid #2a2a2a;
            flex-wrap: wrap;
            min-height: 60px;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .toolbar-label {
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
        }

        /* Toggle Button */
        .toggle-btn {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .toggle-btn.active {
            background: var(--cyan);
            border-color: var(--cyan);
            color: #0a0a0a;
        }

        .toggle-btn:hover {
            border-color: var(--cyan);
        }

        /* Dropdown */
        select {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 6px 12px;
            border-radius: 4px;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        select:hover,
        select:focus {
            border-color: var(--cyan);
            outline: none;
        }

        select option {
            background: #1a1a1a;
            color: #e0e0e0;
        }

        /* Search Input */
        .search-input {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 4px;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            transition: all 0.2s ease;
            min-width: 200px;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--cyan);
        }

        .search-input::placeholder {
            color: #666;
        }

        /* Main Container */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Kanban Board */
        .kanban-board {
            display: flex;
            gap: 20px;
            padding: 24px;
            overflow-x: auto;
            overflow-y: hidden;
            flex: 1;
            scroll-behavior: smooth;
        }

        .kanban-board::-webkit-scrollbar {
            height: 6px;
        }

        .kanban-board::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .kanban-board::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 3px;
        }

        .kanban-board::-webkit-scrollbar-thumb:hover {
            background: #4a4a4a;
        }

        /* Column */
        .kanban-column {
            flex: 0 0 340px;
            background: #141414;
            border-radius: 8px;
            border: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            max-height: 100%;
            transition: background 0.3s ease;
        }

        .kanban-column.backlog {
            background: rgba(62, 186, 244, 0.03);
            border-color: rgba(62, 186, 244, 0.1);
        }

        .kanban-column.in-progress {
            background: rgba(223, 48, 255, 0.03);
            border-color: rgba(223, 48, 255, 0.1);
        }

        .kanban-column.review {
            background: rgba(255, 233, 48, 0.03);
            border-color: rgba(255, 233, 48, 0.1);
        }

        .kanban-column.done {
            background: rgba(0, 212, 155, 0.03);
            border-color: rgba(0, 212, 155, 0.1);
        }

        .kanban-column.drag-over {
            background: rgba(62, 186, 244, 0.1);
            border-color: var(--cyan);
        }

        /* Column Header */
        .column-header {
            padding: 16px;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .column-title {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .column-count {
            background: #2a2a2a;
            color: var(--cyan);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            min-width: 24px;
            text-align: center;
        }

        /* Cards Container */
        .cards-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cards-container::-webkit-scrollbar {
            width: 4px;
        }

        .cards-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .cards-container::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 2px;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: #555;
            font-size: 12px;
            text-align: center;
            padding: 20px;
        }

        /* Task Card */
        .task-card {
            background: var(--card-bg);
            border: 1px solid #2a2a2a;
            border-left: 4px solid var(--cyan);
            border-radius: 6px;
            padding: 12px;
            cursor: grab;
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .task-card:hover {
            background: var(--card-hover);
            border-color: #3a3a3a;
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(62, 186, 244, 0.1);
        }

        .task-card:active {
            cursor: grabbing;
        }

        .task-card.dragging {
            opacity: 0.5;
        }

        .task-card.critical {
            border-left-color: var(--red);
        }

        .task-card.high {
            border-left-color: var(--orange);
        }

        .task-card.medium {
            border-left-color: var(--cyan);
        }

        .task-card.low {
            border-left-color: var(--gray);
        }

        .task-card.example-badge::before {
            content: "EXAMPLE";
            display: inline-block;
            background: rgba(255, 233, 48, 0.2);
            color: var(--yellow);
            font-size: 9px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 3px;
            margin-bottom: 4px;
        }

        /* Card Header */
        .card-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
        }

        .card-checkbox {
            margin-top: 2px;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.4;
            flex: 1;
            word-break: break-word;
        }

        /* Priority Badge */
        .priority-badge {
            background: #2a2a2a;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
            display: inline-block;
        }

        .priority-badge.critical {
            background: rgba(255, 71, 87, 0.2);
            color: var(--red);
        }

        .priority-badge.high {
            background: rgba(255, 149, 0, 0.2);
            color: var(--orange);
        }

        .priority-badge.medium {
            background: rgba(62, 186, 244, 0.2);
            color: var(--cyan);
        }

        .priority-badge.low {
            background: rgba(102, 102, 102, 0.2);
            color: var(--gray);
        }

        /* Card Meta */
        .card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            font-size: 11px;
            color: #999;
        }

        /* Assignee */
        .assignee {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            background: #2a2a2a;
            border-radius: 3px;
            font-size: 11px;
        }

        .assignee-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--cyan);
        }

        .assignee-dot.human {
            background: var(--purple);
        }

        .assignee-dot.agent {
            background: var(--green);
        }

        /* Due Date */
        .due-date {
            color: #999;
            font-size: 11px;
        }

        .due-date.overdue {
            color: var(--red);
            font-weight: 600;
        }

        /* Project Tag */
        .project-tag {
            background: rgba(62, 186, 244, 0.15);
            color: var(--cyan);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 500;
        }

        /* Score */
        .priority-score {
            background: #2a2a2a;
            color: var(--yellow);
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
        }

        /* Create Task Button */
        .create-task-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--cyan);
            border: none;
            color: #0a0a0a;
            font-size: 28px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(62, 186, 244, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .create-task-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 32px rgba(62, 186, 244, 0.4);
        }

        .create-task-btn:active {
            transform: scale(0.95);
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--card-bg);
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 28px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #fff;
        }

        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #999;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            background: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 10px;
            border-radius: 4px;
            font-family: 'Poppins', sans-serif;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--cyan);
            background: #333;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
            font-family: 'Poppins', sans-serif;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 4px;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-cancel {
            background: #2a2a2a;
            color: #e0e0e0;
            border: 1px solid #3a3a3a;
        }

        .btn-cancel:hover {
            background: #3a3a3a;
        }

        .btn-save {
            background: var(--cyan);
            color: #0a0a0a;
        }

        .btn-save:hover {
            background: #2da8d4;
        }

        /* Bulk Action Bar */
        .bulk-action-bar {
            display: none;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 50;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.3s ease;
        }

        .bulk-action-bar.active {
            display: flex;
        }

        .bulk-count {
            color: var(--cyan);
            font-size: 12px;
            font-weight: 600;
        }

        .bulk-actions {
            display: flex;
            gap: 12px;
        }

        .bulk-btn {
            padding: 8px 16px;
            border-radius: 4px;
            border: 1px solid #3a3a3a;
            background: #2a2a2a;
            color: #e0e0e0;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bulk-btn:hover {
            border-color: var(--cyan);
            color: var(--cyan);
        }

        .bulk-btn.delete:hover {
            border-color: var(--red);
            color: var(--red);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar-group {
                width: 100%;
                flex-wrap: wrap;
            }

            .kanban-board {
                gap: 12px;
                padding: 12px;
            }

            .kanban-column {
                flex: 0 0 280px;
            }

            .create-task-btn {
                bottom: 20px;
                right: 20px;
            }

            .search-input {
                min-width: 100%;
            }

            select {
                flex: 1;
                min-width: 100px;
            }
        }
    </style>
</head>
<body>
    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-group">
            <button class="toggle-btn" id="myTasksBtn" title="Show only tasks assigned to you">My Tasks</button>
        </div>

        <div class="toolbar-group">
            <label class="toolbar-label">Assignee</label>
            <select id="assigneeFilter" title="Filter tasks by assignee">
                <option value="">All</option>
                <option value="Forge">Forge</option>
                <option value="Quill">Quill</option>
                <option value="Atlas">Atlas</option>
                <option value="Echo">Echo</option>
                <option value="You">You (Human)</option>
            </select>
        </div>

        <div class="toolbar-group">
            <label class="toolbar-label">Priority</label>
            <select id="priorityFilter" title="Filter tasks by priority">
                <option value="">All</option>
                <option value="critical">Critical</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
        </div>

        <div class="toolbar-group">
            <input type="text" id="searchInput" class="search-input" placeholder="Search tasks..." title="Search within task titles">
        </div>

        <div class="toolbar-group">
            <label class="toolbar-label">Sort</label>
            <select id="sortBy" title="Sort tasks">
                <option value="newest">Newest First</option>
                <option value="priority">By Priority</option>
                <option value="duedate">By Due Date</option>
            </select>
        </div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <div class="kanban-board" id="kanbanBoard">
            <!-- Columns will be generated by JavaScript -->
        </div>
    </div>

    <!-- Create Task Button -->
    <button class="create-task-btn" id="createTaskBtn" title="Create a new task">+</button>

    <!-- Create Task Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>New Task</h2>
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskTitle">Title *</label>
                    <input type="text" id="taskTitle" required placeholder="What needs to be done?">
                </div>

                <div class="form-group">
                    <label for="taskDescription">Description</label>
                    <textarea id="taskDescription" placeholder="Add more details..."></textarea>
                </div>

                <div class="form-group">
                    <label for="taskAssignee">Assignee *</label>
                    <select id="taskAssignee" required>
                        <option value="">Select an agent or human</option>
                        <option value="Forge">Forge (Agent)</option>
                        <option value="Quill">Quill (Agent)</option>
                        <option value="Atlas">Atlas (Agent)</option>
                        <option value="Echo">Echo (Agent)</option>
                        <option value="You">You (Human)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="taskPriority">Priority *</label>
                    <select id="taskPriority" required>
                        <option value="medium">Medium</option>
                        <option value="critical">Critical</option>
                        <option value="high">High</option>
                        <option value="low">Low</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="taskDueDate">Due Date</label>
                    <input type="date" id="taskDueDate">
                </div>

                <div class="form-group">
                    <label for="taskProject">Project Link</label>
                    <input type="text" id="taskProject" placeholder="e.g., Project Alpha">
                </div>

                <div class="modal-buttons">
                    <button type="button" class="btn btn-cancel" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn btn-save">Create Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Bulk Action Bar -->
    <div class="bulk-action-bar" id="bulkActionBar">
        <span class="bulk-count" id="bulkCount">0 selected</span>
        <div class="bulk-actions">
            <select id="bulkMove" class="bulk-btn" title="Move selected tasks">
                <option value="">Move to...</option>
                <option value="backlog">Backlog</option>
                <option value="in-progress">In Progress</option>
                <option value="review">Review</option>
                <option value="done">Done</option>
            </select>
            <button class="bulk-btn" id="bulkDelete" title="Delete selected tasks">Delete</button>
        </div>
    </div>

    <script>
        // ==================== STATE MANAGEMENT ====================
        const COLUMNS = ['backlog', 'in-progress', 'review', 'done'];
        const COLUMN_NAMES = {
            backlog: 'Backlog',
            'in-progress': 'In Progress',
            review: 'Review',
            done: 'Done'
        };

        const AGENTS = ['Forge', 'Quill', 'Atlas', 'Echo'];

        class TaskManager {
            constructor() {
                this.tasks = this.loadTasks();
                this.selectedTasks = new Set();
                this.filters = {
                    myTasks: false,
                    assignee: '',
                    priority: '',
                    search: '',
                    sortBy: 'newest'
                };
                this.currentUser = 'You';
            }

            loadTasks() {
                const stored = localStorage.getItem('hiveTasks');
                if (stored) {
                    return JSON.parse(stored);
                }
                // Create example tasks
                return [
                    {
                        id: 'example-1',
                        title: 'Build user authentication module',
                        description: 'Implement secure login system with OAuth2 support',
                        column: 'in-progress',
                        assignee: 'Forge',
                        priority: 'critical',
                        dueDate: new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                        project: 'Core Infrastructure',
                        createdAt: new Date(Date.now() - 5 * 24 * 60 * 60 * 1000).toISOString(),
                        isExample: true
                    },
                    {
                        id: 'example-2',
                        title: 'Write API documentation',
                        description: 'Document all REST endpoints with examples',
                        column: 'backlog',
                        assignee: 'Quill',
                        priority: 'high',
                        dueDate: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                        project: 'Documentation',
                        createdAt: new Date(Date.now() - 2 * 24 * 60 * 60 * 1000).toISOString(),
                        isExample: true
                    },
                    {
                        id: 'example-3',
                        title: 'Design database schema',
                        description: 'Create normalized schema for user data and analytics',
                        column: 'review',
                        assignee: 'Atlas',
                        priority: 'medium',
                        dueDate: new Date(Date.now() + 1 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                        project: 'Database',
                        createdAt: new Date(Date.now() - 10 * 24 * 60 * 60 * 1000).toISOString(),
                        isExample: true
                    },
                    {
                        id: 'example-4',
                        title: 'Fix sidebar navigation bug',
                        description: 'Mobile menu not closing on item select',
                        column: 'done',
                        assignee: 'You',
                        priority: 'high',
                        dueDate: new Date(Date.now() - 2 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
                        project: 'Frontend',
                        createdAt: new Date(Date.now() - 15 * 24 * 60 * 60 * 1000).toISOString(),
                        isExample: true
                    }
                ];
            }

            saveTasks() {
                localStorage.setItem('hiveTasks', JSON.stringify(this.tasks));
                this.syncWithParent();
            }

            syncWithParent() {
                // Try to send tasks to parent window if available
                if (window.parent && window.parent.hiveWS) {
                    try {
                        window.parent.hiveWS.emit('tasks:updated', this.tasks);
                    } catch (e) {
                        // Parent WS not available, that's fine
                    }
                }
            }

            addTask(taskData) {
                const task = {
                    id: 'task-' + Date.now(),
                    ...taskData,
                    column: 'backlog',
                    createdAt: new Date().toISOString(),
                    isExample: false
                };
                this.tasks.push(task);
                this.saveTasks();
                return task;
            }

            updateTask(id, updates) {
                const task = this.tasks.find(t => t.id === id);
                if (task) {
                    Object.assign(task, updates);
                    this.saveTasks();
                }
            }

            deleteTask(id) {
                this.tasks = this.tasks.filter(t => t.id !== id);
                this.selectedTasks.delete(id);
                this.saveTasks();
            }

            deleteTasks(ids) {
                this.tasks = this.tasks.filter(t => !ids.includes(t.id));
                ids.forEach(id => this.selectedTasks.delete(id));
                this.saveTasks();
            }

            getTasksByColumn(column) {
                return this.tasks.filter(t => t.column === column);
            }

            getFilteredTasks() {
                let filtered = this.tasks;

                if (this.filters.myTasks) {
                    filtered = filtered.filter(t => t.assignee === this.currentUser);
                }

                if (this.filters.assignee) {
                    filtered = filtered.filter(t => t.assignee === this.filters.assignee);
                }

                if (this.filters.priority) {
                    filtered = filtered.filter(t => t.priority === this.filters.priority);
                }

                if (this.filters.search) {
                    const search = this.filters.search.toLowerCase();
                    filtered = filtered.filter(t =>
                        t.title.toLowerCase().includes(search) ||
                        (t.description && t.description.toLowerCase().includes(search))
                    );
                }

                return this.sortTasks(filtered);
            }

            sortTasks(tasks) {
                const sorted = [...tasks];
                switch (this.filters.sortBy) {
                    case 'priority':
                        const priorityOrder = { critical: 0, high: 1, medium: 2, low: 3 };
                        sorted.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
                        break;
                    case 'duedate':
                        sorted.sort((a, b) => {
                            const aDate = a.dueDate ? new Date(a.dueDate) : new Date(9999, 0, 0);
                            const bDate = b.dueDate ? new Date(b.dueDate) : new Date(9999, 0, 0);
                            return aDate - bDate;
                        });
                        break;
                    case 'newest':
                    default:
                        sorted.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                }
                return sorted;
            }

            calculatePriorityScore(task) {
                const priorityScores = { critical: 100, high: 75, medium: 50, low: 25 };
                let score = priorityScores[task.priority] || 50;

                // Bonus for proximity to due date
                if (task.dueDate) {
                    const daysUntilDue = Math.ceil((new Date(task.dueDate) - new Date()) / (1000 * 60 * 60 * 24));
                    if (daysUntilDue < 0) score += 30; // Overdue
                    else if (daysUntilDue <= 1) score += 25;
                    else if (daysUntilDue <= 3) score += 15;
                    else if (daysUntilDue <= 7) score += 5;
                }

                return Math.min(score, 100);
            }

            getAgentType(assignee) {
                if (AGENTS.includes(assignee)) return 'agent';
                return 'human';
            }
        }

        // ==================== UI MANAGER ====================
        class UIManager {
            constructor(taskManager) {
                this.tm = taskManager;
                this.draggedTask = null;
            }

            render() {
                this.renderKanban();
                this.renderBulkBar();
            }

            renderKanban() {
                const board = document.getElementById('kanbanBoard');
                board.innerHTML = '';

                const filtered = this.tm.getFilteredTasks();
                const tasksByColumn = {};
                COLUMNS.forEach(col => {
                    tasksByColumn[col] = filtered.filter(t => t.column === col);
                });

                COLUMNS.forEach(column => {
                    const columnEl = document.createElement('div');
                    columnEl.className = `kanban-column ${column}`;
                    columnEl.setAttribute('data-column', column);
                    columnEl.ondragover = (e) => this.handleDragOver(e);
                    columnEl.ondragleave = (e) => this.handleDragLeave(e);
                    columnEl.ondrop = (e) => this.handleDrop(e, column);

                    const header = document.createElement('div');
                    header.className = 'column-header';
                    header.innerHTML = `
                        <span class="column-title">
                            ${COLUMN_NAMES[column]}
                            <span class="column-count">${tasksByColumn[column].length}</span>
                        </span>
                    `;

                    const container = document.createElement('div');
                    container.className = 'cards-container';

                    if (tasksByColumn[column].length === 0) {
                        const empty = document.createElement('div');
                        empty.className = 'empty-state';
                        empty.textContent = 'No tasks';
                        container.appendChild(empty);
                    } else {
                        tasksByColumn[column].forEach(task => {
                            container.appendChild(this.renderTaskCard(task));
                        });
                    }

                    columnEl.appendChild(header);
                    columnEl.appendChild(container);
                    board.appendChild(columnEl);
                });
            }

            renderTaskCard(task) {
                const card = document.createElement('div');
                card.className = `task-card ${task.priority}`;
                if (task.isExample) card.classList.add('example-badge');
                card.setAttribute('data-task-id', task.id);
                card.draggable = true;

                if (this.tm.selectedTasks.has(task.id)) {
                    card.style.background = 'rgba(62, 186, 244, 0.1)';
                    card.style.borderColor = 'var(--cyan)';
                }

                const score = this.tm.calculatePriorityScore(task);
                const agentType = this.tm.getAgentType(task.assignee);

                const dueDate = task.dueDate ? new Date(task.dueDate) : null;
                const now = new Date();
                let dueDateStr = '';
                let dueDateClass = '';

                if (dueDate) {
                    const daysUntilDue = Math.ceil((dueDate - now) / (1000 * 60 * 60 * 24));
                    if (daysUntilDue < 0) {
                        dueDateStr = `${Math.abs(daysUntilDue)} days overdue`;
                        dueDateClass = 'overdue';
                    } else if (daysUntilDue === 0) {
                        dueDateStr = 'Today';
                    } else if (daysUntilDue === 1) {
                        dueDateStr = 'Tomorrow';
                    } else if (daysUntilDue <= 7) {
                        dueDateStr = `In ${daysUntilDue} days`;
                    } else {
                        dueDateStr = dueDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                    }
                }

                card.innerHTML = `
                    <div class="card-header">
                        <input type="checkbox" class="card-checkbox" ${this.tm.selectedTasks.has(task.id) ? 'checked' : ''}>
                        <div style="flex: 1;">
                            <div class="card-title">${escapeHtml(task.title)}</div>
                        </div>
                    </div>
                    <div style="display: flex; gap: 6px; flex-wrap: wrap;">
                        <span class="priority-badge ${task.priority}">${task.priority.toUpperCase()}</span>
                        <span class="priority-score">Score: ${score}</span>
                    </div>
                    <div class="card-meta">
                        <div class="assignee">
                            <span class="assignee-dot ${agentType}"></span>
                            ${escapeHtml(task.assignee)}
                        </div>
                        ${dueDateStr ? `<span class="due-date ${dueDateClass}">${dueDateStr}</span>` : ''}
                        ${task.project ? `<span class="project-tag">${escapeHtml(task.project)}</span>` : ''}
                    </div>
                `;

                // Event listeners
                card.addEventListener('dragstart', (e) => this.handleDragStart(e, task.id));
                card.addEventListener('dragend', (e) => this.handleDragEnd(e));

                const checkbox = card.querySelector('.card-checkbox');
                checkbox.addEventListener('change', (e) => {
                    e.stopPropagation();
                    if (e.target.checked) {
                        this.tm.selectedTasks.add(task.id);
                    } else {
                        this.tm.selectedTasks.delete(task.id);
                    }
                    this.render();
                });

                return card;
            }

            renderBulkBar() {
                const bar = document.getElementById('bulkActionBar');
                const count = document.getElementById('bulkCount');
                const moveSelect = document.getElementById('bulkMove');

                if (this.tm.selectedTasks.size > 0) {
                    bar.classList.add('active');
                    count.textContent = `${this.tm.selectedTasks.size} selected`;
                    moveSelect.value = '';
                } else {
                    bar.classList.remove('active');
                }
            }

            handleDragStart(e, taskId) {
                this.draggedTask = taskId;
                const card = e.target.closest('.task-card');
                card.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
            }

            handleDragEnd(e) {
                const card = e.target.closest('.task-card');
                if (card) card.classList.remove('dragging');
            }

            handleDragOver(e) {
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                const column = e.target.closest('.kanban-column');
                if (column) {
                    column.classList.add('drag-over');
                }
            }

            handleDragLeave(e) {
                const column = e.target.closest('.kanban-column');
                if (column && !column.contains(e.relatedTarget)) {
                    column.classList.remove('drag-over');
                }
            }

            handleDrop(e, columnId) {
                e.preventDefault();
                const column = e.target.closest('.kanban-column');
                if (column) {
                    column.classList.remove('drag-over');
                }

                if (this.draggedTask) {
                    this.tm.updateTask(this.draggedTask, { column: columnId });
                    this.draggedTask = null;
                    this.render();
                }
            }
        }

        // ==================== APP INITIALIZATION ====================
        const taskManager = new TaskManager();
        const uiManager = new UIManager(taskManager);

        document.addEventListener('DOMContentLoaded', () => {
            // Initial render
            uiManager.render();

            // Toolbar events
            document.getElementById('myTasksBtn').addEventListener('click', (e) => {
                taskManager.filters.myTasks = !taskManager.filters.myTasks;
                e.target.classList.toggle('active');
                uiManager.render();
            });

            document.getElementById('assigneeFilter').addEventListener('change', (e) => {
                taskManager.filters.assignee = e.target.value;
                uiManager.render();
            });

            document.getElementById('priorityFilter').addEventListener('change', (e) => {
                taskManager.filters.priority = e.target.value;
                uiManager.render();
            });

            document.getElementById('searchInput').addEventListener('input', (e) => {
                taskManager.filters.search = e.target.value;
                uiManager.render();
            });

            document.getElementById('sortBy').addEventListener('change', (e) => {
                taskManager.filters.sortBy = e.target.value;
                uiManager.render();
            });

            // Modal events
            const modal = document.getElementById('modalOverlay');
            const createBtn = document.getElementById('createTaskBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            const form = document.getElementById('taskForm');

            createBtn.addEventListener('click', () => {
                modal.classList.add('active');
                document.getElementById('taskTitle').focus();
            });

            cancelBtn.addEventListener('click', () => {
                modal.classList.remove('active');
                form.reset();
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                    form.reset();
                }
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const taskData = {
                    title: document.getElementById('taskTitle').value,
                    description: document.getElementById('taskDescription').value,
                    assignee: document.getElementById('taskAssignee').value,
                    priority: document.getElementById('taskPriority').value,
                    dueDate: document.getElementById('taskDueDate').value,
                    project: document.getElementById('taskProject').value
                };

                taskManager.addTask(taskData);
                uiManager.render();
                modal.classList.remove('active');
                form.reset();
            });

            // Bulk actions
            document.getElementById('bulkMove').addEventListener('change', (e) => {
                if (e.target.value && taskManager.selectedTasks.size > 0) {
                    const selectedArray = Array.from(taskManager.selectedTasks);
                    selectedArray.forEach(id => {
                        taskManager.updateTask(id, { column: e.target.value });
                    });
                    taskManager.selectedTasks.clear();
                    uiManager.render();
                    e.target.value = '';
                }
            });

            document.getElementById('bulkDelete').addEventListener('click', () => {
                if (taskManager.selectedTasks.size > 0) {
                    if (confirm(`Delete ${taskManager.selectedTasks.size} task(s)?`)) {
                        const selectedArray = Array.from(taskManager.selectedTasks);
                        taskManager.deleteTasks(selectedArray);
                        uiManager.render();
                    }
                }
            });

            // Sync periodically with parent
            setInterval(() => {
                taskManager.syncWithParent();
            }, 5000);
        });

        // ==================== UTILITIES ====================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ── Gateway Event Bridge (receives events from parent HiveControl shell) ──
        window.addEventListener('message', (event) => {
            try {
                if (event.data && event.data.type === 'hiveEvent') {
                    const { event: evt, payload } = event.data;
                    handleGatewayEvent(evt, payload);
                }
            } catch (_) {}
        });

        function handleGatewayEvent(event, payload) {
            switch (event) {
                case 'heartbeat':
                    // Update any live status indicators
                    break;
                case 'agent':
                    // Agent status change
                    break;
                case 'health':
                    // Gateway health update
                    break;
                default:
                    break;
            }
        }
    </script>
