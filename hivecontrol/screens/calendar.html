<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - HiveControl OS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
        }

        .container {
            display: flex;
            height: 100vh;
            flex-direction: column;
        }

        /* Header */
        .header {
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .header-title {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: #3ebaf4;
        }

        .nav-arrows {
            display: flex;
            gap: 0.5rem;
        }

        .nav-btn {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            font-size: 1.2rem;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            background-color: #3a3a3a;
            color: #3ebaf4;
        }

        .current-date {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            color: #3ebaf4;
            min-width: 200px;
            text-align: center;
        }

        .header-right {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .view-toggle {
            display: flex;
            gap: 0.5rem;
            background-color: #2a2a2a;
            padding: 0.5rem;
            border-radius: 4px;
            border: 1px solid #3a3a3a;
        }

        .view-btn {
            background-color: transparent;
            border: none;
            color: #888;
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 3px;
            transition: all 0.2s ease;
        }

        .view-btn.active {
            background-color: #3ebaf4;
            color: #0a0a0a;
        }

        .view-btn:hover:not(.active) {
            color: #3ebaf4;
        }

        .today-btn {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 0.5rem 1rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .today-btn:hover {
            background-color: #3ebaf4;
            color: #0a0a0a;
        }

        .add-event-btn {
            background-color: #df30ff;
            border: none;
            color: #fff;
            padding: 0.5rem 1.5rem;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 1.2rem;
        }

        .add-event-btn:hover {
            background-color: #e850ff;
            transform: scale(1.05);
        }

        /* Main Content Area */
        .content-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Month View */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background-color: #1a1a1a;
            padding: 1rem;
            flex: 1;
            overflow: auto;
        }

        .weekday-header {
            background-color: #1a1a1a;
            text-align: center;
            padding: 1rem;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            color: #3ebaf4;
            border-bottom: 2px solid #3ebaf4;
        }

        .calendar-day {
            background-color: #1a1a1a;
            min-height: 100px;
            padding: 0.75rem;
            border: 1px solid #2a2a2a;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .calendar-day:hover {
            background-color: #222;
            border-color: #3a3a3a;
        }

        .calendar-day.other-month {
            background-color: #0d0d0d;
            color: #555;
        }

        .calendar-day.today {
            border: 2px solid #3ebaf4;
            background-color: #1a2a2a;
        }

        .day-number {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
        }

        .day-events {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            flex: 1;
        }

        .event-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.3rem;
        }

        .event-indicator {
            font-size: 0.7rem;
            padding: 0.2rem 0.4rem;
            border-radius: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .event-indicator:hover {
            transform: scale(1.05);
        }

        .event-cron {
            background-color: #1a3a4a;
            color: #3ebaf4;
        }

        .event-heartbeat {
            background-color: #3a1a4a;
            color: #df30ff;
        }

        .event-task {
            background-color: #1a3a1a;
            color: #00d49b;
        }

        .event-reminder {
            background-color: #3a3a1a;
            color: #ffe930;
        }

        /* Week View */
        .week-container {
            display: flex;
            gap: 1px;
            background-color: #1a1a1a;
            flex: 1;
            overflow: hidden;
        }

        .week-time-col {
            width: 60px;
            background-color: #1a1a1a;
            border-right: 1px solid #2a2a2a;
            overflow-y: auto;
            padding-top: 2rem;
        }

        .time-slot-label {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            color: #666;
            border-bottom: 1px solid #2a2a2a;
        }

        .week-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background-color: #1a1a1a;
            flex: 1;
            overflow-y: auto;
        }

        .week-day-col {
            background-color: #1a1a1a;
            border-right: 1px solid #2a2a2a;
        }

        .week-day-header {
            padding: 1rem;
            background-color: #1a1a1a;
            border-bottom: 2px solid #3a3a3a;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 5;
        }

        .week-day-name {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            color: #666;
        }

        .week-day-date {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #e0e0e0;
        }

        .week-day-col.today .week-day-header {
            border-bottom-color: #3ebaf4;
            background-color: #1a2a2a;
        }

        .time-grid {
            position: relative;
            min-height: 1440px;
        }

        .time-slot {
            height: 60px;
            border-bottom: 1px solid #2a2a2a;
            position: relative;
        }

        .week-event {
            position: absolute;
            left: 2px;
            right: 2px;
            border-radius: 3px;
            padding: 0.3rem;
            font-size: 0.7rem;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid;
        }

        .week-event:hover {
            transform: scale(1.02);
        }

        .week-event.cron {
            background-color: #1a3a4a;
            color: #3ebaf4;
            border-left-color: #3ebaf4;
        }

        .week-event.heartbeat {
            background-color: #3a1a4a;
            color: #df30ff;
            border-left-color: #df30ff;
        }

        .week-event.task {
            background-color: #1a3a1a;
            color: #00d49b;
            border-left-color: #00d49b;
        }

        .week-event.reminder {
            background-color: #3a3a1a;
            color: #ffe930;
            border-left-color: #ffe930;
        }

        .time-now-line {
            position: absolute;
            left: 0;
            right: 0;
            height: 2px;
            background-color: #3ebaf4;
            z-index: 10;
            pointer-events: none;
        }

        /* Day View */
        .day-view-container {
            display: flex;
            gap: 1px;
            background-color: #1a1a1a;
            flex: 1;
            overflow: hidden;
        }

        .day-time-col {
            width: 80px;
            background-color: #1a1a1a;
            border-right: 1px solid #2a2a2a;
            overflow-y: auto;
            padding-top: 2rem;
        }

        .day-events-col {
            flex: 1;
            background-color: #1a1a1a;
            overflow-y: auto;
        }

        .day-header {
            padding: 2rem 1.5rem;
            background-color: #1a1a1a;
            border-bottom: 2px solid #3ebaf4;
        }

        .day-header-date {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 2rem;
            color: #3ebaf4;
            margin-bottom: 0.25rem;
        }

        .day-header-day {
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            color: #888;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background-color: #1a1a1a;
            border-left: 1px solid #2a2a2a;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 1rem;
            background-color: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            color: #3ebaf4;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .today-event {
            background-color: #2a2a2a;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            border-radius: 4px;
            border-left: 3px solid #3ebaf4;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .today-event:hover {
            background-color: #333;
            transform: translateX(4px);
        }

        .today-event-time {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            color: #3ebaf4;
            margin-bottom: 0.3rem;
        }

        .today-event-title {
            font-size: 0.85rem;
            color: #e0e0e0;
            margin-bottom: 0.2rem;
        }

        .today-event-agent {
            font-size: 0.75rem;
            color: #888;
        }

        .now-marker {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            color: #3ebaf4;
            font-size: 0.8rem;
            padding: 0.5rem;
            background-color: #1a3a4a;
            border-radius: 3px;
            text-align: center;
            margin-bottom: 1rem;
        }

        /* Legend */
        .legend {
            background-color: #1a1a1a;
            border-top: 1px solid #2a2a2a;
            padding: 1rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
        }

        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .legend-color.cron {
            background-color: #3ebaf4;
        }

        .legend-color.heartbeat {
            background-color: #df30ff;
        }

        .legend-color.task {
            background-color: #00d49b;
        }

        .legend-color.reminder {
            background-color: #ffe930;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background-color: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: #3ebaf4;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #e0e0e0;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 0.75rem;
            border-radius: 4px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #3ebaf4;
            background-color: #333;
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .cron-helper {
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            padding: 1rem;
            border-radius: 4px;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            color: #aaa;
        }

        .form-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }

        .btn-primary {
            flex: 1;
            background-color: #3ebaf4;
            border: none;
            color: #0a0a0a;
            padding: 0.75rem;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background-color: #5ecbff;
            transform: translateY(-2px);
        }

        .btn-secondary {
            flex: 1;
            background-color: #2a2a2a;
            border: 1px solid #3a3a3a;
            color: #e0e0e0;
            padding: 0.75rem;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background-color: #3a3a3a;
            border-color: #4a4a4a;
        }

        /* Event Details Popup */
        .event-details {
            background-color: #1a1a1a;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            padding: 1.5rem;
            max-width: 400px;
            z-index: 101;
            position: fixed;
        }

        .event-details-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }

        .event-details-title {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
            font-size: 1.2rem;
            color: #3ebaf4;
        }

        .event-details-close {
            background: none;
            border: none;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .event-details-close:hover {
            color: #e0e0e0;
        }

        .event-details-row {
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
        }

        .event-details-label {
            color: #888;
            font-weight: 500;
        }

        .event-details-value {
            color: #e0e0e0;
            margin-top: 0.2rem;
        }

        .event-type-badge {
            display: inline-block;
            padding: 0.3rem 0.6rem;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 0.2rem;
        }

        .event-type-badge.cron {
            background-color: #1a3a4a;
            color: #3ebaf4;
        }

        .event-type-badge.heartbeat {
            background-color: #3a1a4a;
            color: #df30ff;
        }

        .event-type-badge.task {
            background-color: #1a3a1a;
            color: #00d49b;
        }

        .event-type-badge.reminder {
            background-color: #3a3a1a;
            color: #ffe930;
        }

        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 600;
            margin-top: 0.2rem;
        }

        .status-badge.active {
            background-color: #1a3a1a;
            color: #00d49b;
        }

        .status-badge.paused {
            background-color: #3a2a1a;
            color: #ff9500;
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .sidebar {
                width: 200px;
            }
        }

        @media (max-width: 768px) {
            .content-wrapper {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                min-height: 200px;
                max-height: 250px;
                border-left: none;
                border-top: 1px solid #2a2a2a;
            }

            .header {
                flex-wrap: wrap;
                gap: 1rem;
            }

            .header-right {
                width: 100%;
                justify-content: space-between;
            }

            .calendar-grid {
                padding: 0.5rem;
            }

            .calendar-day {
                min-height: 80px;
                padding: 0.5rem;
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <div class="header-title">Calendar</div>
                <div class="nav-arrows">
                    <button class="nav-btn" id="prevBtn" title="Previous">←</button>
                    <button class="nav-btn" id="nextBtn" title="Next">→</button>
                </div>
                <div class="current-date" id="currentDate"></div>
            </div>
            <div class="header-right">
                <div class="view-toggle">
                    <button class="view-btn active" data-view="month">Month</button>
                    <button class="view-btn" data-view="week">Week</button>
                    <button class="view-btn" data-view="day">Day</button>
                </div>
                <button class="today-btn" id="todayBtn">Today</button>
                <button class="add-event-btn" id="addEventBtn">+</button>
            </div>
        </div>

        <!-- Content Area -->
        <div class="content-wrapper">
            <div class="main-content">
                <!-- Month View -->
                <div id="monthView" class="calendar-grid"></div>

                <!-- Week View -->
                <div id="weekView" class="hidden" style="display: flex; gap: 1px; background-color: #1a1a1a; flex: 1; overflow: hidden;">
                    <div class="week-time-col" id="weekTimeCol"></div>
                    <div class="week-days" id="weekDays"></div>
                </div>

                <!-- Day View -->
                <div id="dayView" class="hidden day-view-container">
                    <div class="day-time-col" id="dayTimeCol"></div>
                    <div class="day-events-col">
                        <div class="day-header">
                            <div class="day-header-date" id="dayHeaderDate"></div>
                            <div class="day-header-day" id="dayHeaderDay"></div>
                        </div>
                        <div id="dayEventsContainer" style="position: relative;"></div>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-header">Today's Events</div>
                <div class="sidebar-content" id="sidebarContent">
                    <div class="now-marker" id="nowMarker"></div>
                    <div id="todayEventsList"></div>
                </div>
            </div>
        </div>

        <!-- Legend -->
        <div class="legend">
            <div class="legend-item">
                <div class="legend-color cron"></div>
                <span>Cron Jobs</span>
            </div>
            <div class="legend-item">
                <div class="legend-color heartbeat"></div>
                <span>Heartbeats</span>
            </div>
            <div class="legend-item">
                <div class="legend-color task"></div>
                <span>Scheduled Tasks</span>
            </div>
            <div class="legend-item">
                <div class="legend-color reminder"></div>
                <span>Reminders</span>
            </div>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header" id="modalTitle">Add Event</div>
            <form id="eventForm">
                <div class="form-group">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-input" id="eventTitle" placeholder="Event title" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Type</label>
                    <select class="form-select" id="eventType" required>
                        <option value="cron">Cron Job</option>
                        <option value="heartbeat">Heartbeat</option>
                        <option value="task">Scheduled Task</option>
                        <option value="reminder">Reminder</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Agent Owner</label>
                    <input type="text" class="form-input" id="eventAgent" placeholder="e.g., Quill, Atlas, Orion">
                </div>
                <div class="form-group">
                    <label class="form-label">Schedule / Cron Expression</label>
                    <input type="text" class="form-input" id="eventSchedule" placeholder="e.g., 0 8 * * * (8am daily)" required>
                    <div class="cron-helper">
                        <strong>Cron Format:</strong> minute hour day month weekday<br>
                        Examples: <br>
                        • 0 8 * * * = 8:00 AM daily<br>
                        • 0 */6 * * * = Every 6 hours<br>
                        • 0 12 * * 1-5 = Noon weekdays<br>
                        • 0 9 * * 1 = 9 AM Mondays
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Description (Optional)</label>
                    <textarea class="form-textarea" id="eventDescription" placeholder="Add details about this event"></textarea>
                </div>
                <div class="form-buttons">
                    <button type="submit" class="btn-primary">Save Event</button>
                    <button type="button" class="btn-secondary" id="closeModalBtn">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Event Details Popup (Hidden until needed) -->
    <div id="eventDetailsPopup" class="event-details hidden"></div>

    <script>
        // Calendar State
        let currentDate = new Date();
        let currentView = 'month';
        let events = [];

        // Color mapping
        const colors = {
            cron: '#3ebaf4',
            heartbeat: '#df30ff',
            task: '#00d49b',
            reminder: '#ffe930'
        };

        // Initialize
        function init() {
            loadEvents();
            renderCalendar();
            setupEventListeners();
            updateNowMarker();
            setInterval(updateNowMarker, 60000);
        }

        // Load events from localStorage
        function loadEvents() {
            const stored = localStorage.getItem('hiveControlEvents');
            if (stored) {
                events = JSON.parse(stored);
            } else {
                // Initialize with example events
                events = [
                    {
                        id: 'evt-1',
                        title: 'Daily Memory Digest',
                        type: 'cron',
                        agent: 'Quill',
                        schedule: '0 8 * * *',
                        description: 'Generate daily summary of memory updates',
                        lastRun: new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString(),
                        nextRun: new Date(Date.now() + 6 * 60 * 60 * 1000).toISOString(),
                        status: 'active'
                    },
                    {
                        id: 'evt-2',
                        title: 'System Health Check',
                        type: 'cron',
                        agent: 'Atlas',
                        schedule: '0 */6 * * *',
                        description: 'Check system health every 6 hours',
                        lastRun: new Date(Date.now() - 2 * 60 * 60 * 1000).toISOString(),
                        nextRun: new Date(Date.now() + 4 * 60 * 60 * 1000).toISOString(),
                        status: 'active'
                    },
                    {
                        id: 'evt-3',
                        title: 'Task Priority Rebalance',
                        type: 'cron',
                        agent: 'Orion',
                        schedule: '0 12 * * *',
                        description: 'Rebalance task priorities at noon',
                        lastRun: new Date(Date.now() - 12 * 60 * 60 * 1000).toISOString(),
                        nextRun: new Date(Date.now() + 12 * 60 * 60 * 1000).toISOString(),
                        status: 'active'
                    },
                    {
                        id: 'evt-4',
                        title: 'Security Audit',
                        type: 'cron',
                        agent: 'Cipher',
                        schedule: '0 9 * * 1',
                        description: 'Weekly security audit on Mondays',
                        lastRun: new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString(),
                        nextRun: new Date(Date.now() + 5 * 24 * 60 * 60 * 1000).toISOString(),
                        status: 'active'
                    }
                ];
                saveEvents();
            }
        }

        // Save events to localStorage
        function saveEvents() {
            localStorage.setItem('hiveControlEvents', JSON.stringify(events));
        }

        // Setup event listeners
        function setupEventListeners() {
            document.getElementById('prevBtn').addEventListener('click', () => {
                if (currentView === 'month') {
                    currentDate.setMonth(currentDate.getMonth() - 1);
                } else if (currentView === 'week') {
                    currentDate.setDate(currentDate.getDate() - 7);
                } else if (currentView === 'day') {
                    currentDate.setDate(currentDate.getDate() - 1);
                }
                renderCalendar();
            });

            document.getElementById('nextBtn').addEventListener('click', () => {
                if (currentView === 'month') {
                    currentDate.setMonth(currentDate.getMonth() + 1);
                } else if (currentView === 'week') {
                    currentDate.setDate(currentDate.getDate() + 7);
                } else if (currentView === 'day') {
                    currentDate.setDate(currentDate.getDate() + 1);
                }
                renderCalendar();
            });

            document.getElementById('todayBtn').addEventListener('click', () => {
                currentDate = new Date();
                renderCalendar();
            });

            document.getElementById('addEventBtn').addEventListener('click', () => {
                openModal();
            });

            document.querySelectorAll('[data-view]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentView = e.target.dataset.view;
                    currentDate = new Date();
                    renderCalendar();
                });
            });

            document.getElementById('modalOverlay').addEventListener('click', (e) => {
                if (e.target === document.getElementById('modalOverlay')) {
                    closeModal();
                }
            });

            document.getElementById('closeModalBtn').addEventListener('click', closeModal);

            document.getElementById('eventForm').addEventListener('submit', (e) => {
                e.preventDefault();
                saveNewEvent();
            });
        }

        // Update Now marker
        function updateNowMarker() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('nowMarker').textContent = `Now: ${hours}:${minutes}`;
        }

        // Render calendar based on current view
        function renderCalendar() {
            if (currentView === 'month') {
                renderMonthView();
            } else if (currentView === 'week') {
                renderWeekView();
            } else if (currentView === 'day') {
                renderDayView();
            }
            updateCurrentDate();
            renderSidebar();
        }

        // Update current date display
        function updateCurrentDate() {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            if (currentView === 'month') {
                const monthYear = currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                document.getElementById('currentDate').textContent = monthYear;
            } else if (currentView === 'week') {
                const weekStart = getWeekStart(currentDate);
                const weekEnd = new Date(weekStart);
                weekEnd.setDate(weekEnd.getDate() + 6);
                const startStr = weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const endStr = weekEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                document.getElementById('currentDate').textContent = `${startStr} - ${endStr}`;
            } else if (currentView === 'day') {
                document.getElementById('currentDate').textContent = currentDate.toLocaleDateString('en-US', options);
            }
        }

        // Render month view
        function renderMonthView() {
            const monthView = document.getElementById('monthView');
            monthView.innerHTML = '';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDate = new Date(firstDay);
            startDate.setDate(startDate.getDate() - firstDay.getDay());

            const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            weekdays.forEach(day => {
                const header = document.createElement('div');
                header.className = 'weekday-header';
                header.textContent = day;
                monthView.appendChild(header);
            });

            const today = new Date();
            let currentDisplayDate = new Date(startDate);

            for (let i = 0; i < 42; i++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'calendar-day';

                if (currentDisplayDate.getMonth() !== month) {
                    dayEl.classList.add('other-month');
                }

                if (isSameDay(currentDisplayDate, today)) {
                    dayEl.classList.add('today');
                }

                const dayNum = document.createElement('div');
                dayNum.className = 'day-number';
                dayNum.textContent = currentDisplayDate.getDate();
                dayEl.appendChild(dayNum);

                const eventsContainer = document.createElement('div');
                eventsContainer.className = 'day-events';

                const dayEvents = getEventsForDay(currentDisplayDate);
                dayEvents.forEach(event => {
                    const eventEl = document.createElement('div');
                    eventEl.className = `event-indicator event-${event.type}`;
                    eventEl.textContent = event.title;
                    eventEl.addEventListener('click', () => showEventDetails(event));
                    eventsContainer.appendChild(eventEl);
                });

                dayEl.appendChild(eventsContainer);
                dayEl.addEventListener('click', () => {
                    currentDate = new Date(currentDisplayDate);
                    currentView = 'day';
                    document.querySelectorAll('[data-view]').forEach(b => b.classList.remove('active'));
                    document.querySelector('[data-view="day"]').classList.add('active');
                    renderCalendar();
                });

                monthView.appendChild(dayEl);
                currentDisplayDate.setDate(currentDisplayDate.getDate() + 1);
            }
        }

        // Render week view
        function renderWeekView() {
            const weekView = document.getElementById('weekView');
            weekView.style.display = 'flex';
            document.getElementById('monthView').style.display = 'none';
            document.getElementById('dayView').classList.add('hidden');

            const weekTimeCol = document.getElementById('weekTimeCol');
            const weekDays = document.getElementById('weekDays');
            weekTimeCol.innerHTML = '';
            weekDays.innerHTML = '';

            // Time labels
            for (let h = 0; h < 24; h++) {
                const label = document.createElement('div');
                label.className = 'time-slot-label';
                label.textContent = String(h).padStart(2, '0') + ':00';
                weekTimeCol.appendChild(label);
            }

            // Week days
            const weekStart = getWeekStart(currentDate);
            const today = new Date();

            for (let d = 0; d < 7; d++) {
                const dayDate = new Date(weekStart);
                dayDate.setDate(dayDate.getDate() + d);

                const dayCol = document.createElement('div');
                dayCol.className = 'week-day-col';
                if (isSameDay(dayDate, today)) {
                    dayCol.classList.add('today');
                }

                const dayHeader = document.createElement('div');
                dayHeader.className = 'week-day-header';
                dayHeader.innerHTML = `
                    <div class="week-day-name">${['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][dayDate.getDay()]}</div>
                    <div class="week-day-date">${dayDate.getDate()}</div>
                `;
                dayCol.appendChild(dayHeader);

                const timeGrid = document.createElement('div');
                timeGrid.className = 'time-grid';

                // Time slots
                for (let h = 0; h < 24; h++) {
                    const slot = document.createElement('div');
                    slot.className = 'time-slot';
                    timeGrid.appendChild(slot);
                }

                // Add events
                const dayEvents = getEventsForDay(dayDate);
                dayEvents.forEach(event => {
                    const eventEl = document.createElement('div');
                    eventEl.className = `week-event ${event.type}`;
                    const hour = Math.floor(Math.random() * 24);
                    const top = hour * 60;
                    eventEl.style.top = top + 'px';
                    eventEl.style.height = '55px';
                    eventEl.textContent = event.title;
                    eventEl.addEventListener('click', () => showEventDetails(event));
                    timeGrid.appendChild(eventEl);
                });

                dayCol.appendChild(timeGrid);
                weekDays.appendChild(dayCol);
            }
        }

        // Render day view
        function renderDayView() {
            document.getElementById('monthView').style.display = 'none';
            document.getElementById('weekView').style.display = 'none';
            document.getElementById('dayView').classList.remove('hidden');

            const dayTimeCol = document.getElementById('dayTimeCol');
            const dayEventsContainer = document.getElementById('dayEventsContainer');
            const dayHeaderDate = document.getElementById('dayHeaderDate');
            const dayHeaderDay = document.getElementById('dayHeaderDay');

            dayTimeCol.innerHTML = '';
            dayEventsContainer.innerHTML = '';

            // Header
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            dayHeaderDate.textContent = currentDate.getDate();
            dayHeaderDay.textContent = currentDate.toLocaleDateString('en-US', options);

            // Time labels
            for (let h = 0; h < 24; h++) {
                const label = document.createElement('div');
                label.className = 'time-slot-label';
                label.textContent = String(h).padStart(2, '0') + ':00';
                dayTimeCol.appendChild(label);
            }

            // Create time grid
            const timeGrid = document.createElement('div');
            timeGrid.className = 'time-grid';

            for (let h = 0; h < 24; h++) {
                const slot = document.createElement('div');
                slot.className = 'time-slot';
                timeGrid.appendChild(slot);
            }

            // Add events
            const dayEvents = getEventsForDay(currentDate);
            dayEvents.forEach(event => {
                const eventEl = document.createElement('div');
                eventEl.className = `week-event ${event.type}`;
                const hour = Math.floor(Math.random() * 24);
                const top = hour * 60;
                eventEl.style.top = top + 'px';
                eventEl.style.height = '55px';
                eventEl.textContent = event.title;
                eventEl.addEventListener('click', () => showEventDetails(event));
                timeGrid.appendChild(eventEl);
            });

            dayEventsContainer.appendChild(timeGrid);
        }

        // Render sidebar
        function renderSidebar() {
            const todayEventsList = document.getElementById('todayEventsList');
            todayEventsList.innerHTML = '';

            const today = new Date();
            const todayEvents = getEventsForDay(today).sort((a, b) => {
                const aTime = extractTimeFromSchedule(a.schedule);
                const bTime = extractTimeFromSchedule(b.schedule);
                return aTime - bTime;
            });

            if (todayEvents.length === 0) {
                todayEventsList.innerHTML = '<div style="color: #666; padding: 1rem; text-align: center;">No events scheduled for today</div>';
            } else {
                todayEvents.forEach(event => {
                    const eventEl = document.createElement('div');
                    eventEl.className = 'today-event';
                    eventEl.style.borderLeftColor = colors[event.type];

                    const time = extractTimeFromSchedule(event.schedule);
                    const timeStr = String(Math.floor(time / 60)).padStart(2, '0') + ':' + String(time % 60).padStart(2, '0');

                    eventEl.innerHTML = `
                        <div class="today-event-time">${timeStr}</div>
                        <div class="today-event-title">${event.title}</div>
                        <div class="today-event-agent">${event.agent}</div>
                    `;
                    eventEl.addEventListener('click', () => showEventDetails(event));
                    todayEventsList.appendChild(eventEl);
                });
            }
        }

        // Get events for a specific day
        function getEventsForDay(date) {
            return events.filter(event => {
                return isSameDay(new Date(event.nextRun || event.lastRun), date) ||
                       matchesCronSchedule(event.schedule, date);
            });
        }

        // Check if cron matches date
        function matchesCronSchedule(cron, date) {
            const parts = cron.split(' ');
            if (parts.length !== 5) return false;

            const [minute, hour, dayOfMonth, month, dayOfWeek] = parts;
            const d = date.getDate();
            const m = date.getMonth() + 1;
            const dow = date.getDay();

            const matchMinute = minute === '*' || parseInt(minute) === date.getMinutes();
            const matchHour = hour === '*' || parseInt(hour) === date.getHours();
            const matchDay = dayOfMonth === '*' || parseInt(dayOfMonth) === d;
            const matchMonth = month === '*' || parseInt(month) === m;
            const matchDow = dayOfWeek === '*' || parseInt(dayOfWeek) === dow;

            return matchMinute && matchHour && matchDay && matchMonth && matchDow;
        }

        // Extract time minutes from cron
        function extractTimeFromSchedule(schedule) {
            const parts = schedule.split(' ');
            const hour = parseInt(parts[1]) || 0;
            const minute = parseInt(parts[0]) || 0;
            return hour * 60 + minute;
        }

        // Check if two dates are the same day
        function isSameDay(date1, date2) {
            return date1.getFullYear() === date2.getFullYear() &&
                   date1.getMonth() === date2.getMonth() &&
                   date1.getDate() === date2.getDate();
        }

        // Get week start date
        function getWeekStart(date) {
            const d = new Date(date);
            d.setDate(d.getDate() - d.getDay());
            return d;
        }

        // Open modal
        function openModal() {
            document.getElementById('eventForm').reset();
            document.getElementById('modalTitle').textContent = 'Add Event';
            document.getElementById('modalOverlay').classList.add('active');
        }

        // Close modal
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        // Save new event
        function saveNewEvent() {
            const title = document.getElementById('eventTitle').value;
            const type = document.getElementById('eventType').value;
            const agent = document.getElementById('eventAgent').value;
            const schedule = document.getElementById('eventSchedule').value;
            const description = document.getElementById('eventDescription').value;

            const event = {
                id: 'evt-' + Date.now(),
                title,
                type,
                agent,
                schedule,
                description,
                lastRun: new Date().toISOString(),
                nextRun: new Date(Date.now() + 24 * 60 * 60 * 1000).toISOString(),
                status: 'active'
            };

            events.push(event);
            saveEvents();
            closeModal();
            renderCalendar();
        }

        // Show event details popup
        function showEventDetails(event) {
            const popup = document.getElementById('eventDetailsPopup');
            const typeStr = event.type.charAt(0).toUpperCase() + event.type.slice(1);
            const statusStr = event.status.charAt(0).toUpperCase() + event.status.slice(1);
            const lastRunDate = new Date(event.lastRun).toLocaleDateString();
            const nextRunDate = new Date(event.nextRun).toLocaleDateString();

            popup.innerHTML = `
                <div class="event-details-header">
                    <div class="event-details-title">${event.title}</div>
                    <button class="event-details-close" onclick="document.getElementById('eventDetailsPopup').classList.add('hidden')">×</button>
                </div>
                <div class="event-details-row">
                    <div class="event-details-label">Type</div>
                    <div class="event-details-value"><span class="event-type-badge ${event.type}">${typeStr}</span></div>
                </div>
                <div class="event-details-row">
                    <div class="event-details-label">Agent</div>
                    <div class="event-details-value">${event.agent}</div>
                </div>
                <div class="event-details-row">
                    <div class="event-details-label">Schedule</div>
                    <div class="event-details-value">${event.schedule}</div>
                </div>
                ${event.description ? `
                <div class="event-details-row">
                    <div class="event-details-label">Description</div>
                    <div class="event-details-value">${event.description}</div>
                </div>
                ` : ''}
                <div class="event-details-row">
                    <div class="event-details-label">Last Run</div>
                    <div class="event-details-value">${lastRunDate}</div>
                </div>
                <div class="event-details-row">
                    <div class="event-details-label">Next Run</div>
                    <div class="event-details-value">${nextRunDate}</div>
                </div>
                <div class="event-details-row">
                    <div class="event-details-label">Status</div>
                    <div class="event-details-value"><span class="status-badge ${event.status}">${statusStr}</span></div>
                </div>
            `;

            popup.classList.remove('hidden');

            // Position near cursor
            const rect = event.currentTarget?.getBoundingClientRect();
            if (rect) {
                popup.style.left = (rect.right + 10) + 'px';
                popup.style.top = (rect.top) + 'px';
            }

            // Close on outside click
            setTimeout(() => {
                document.addEventListener('click', function closePopup(e) {
                    if (!popup.contains(e.target) && e.target !== event.currentTarget) {
                        popup.classList.add('hidden');
                        document.removeEventListener('click', closePopup);
                    }
                });
            }, 100);
        }

        // Initialize on load
        init();

        // ── Gateway Event Bridge (receives events from parent HiveControl shell) ──
        window.addEventListener('message', (event) => {
            try {
                if (event.data && event.data.type === 'hiveEvent') {
                    const { event: evt, payload } = event.data;
                    handleGatewayEvent(evt, payload);
                }
            } catch (_) {}
        });

        function handleGatewayEvent(event, payload) {
            switch (event) {
                case 'heartbeat':
                    // Update any live status indicators
                    break;
                case 'agent':
                    // Agent status change
                    break;
                case 'health':
                    // Gateway health update
                    break;
                default:
                    break;
            }
        }
    </script>
</body>
</html>
